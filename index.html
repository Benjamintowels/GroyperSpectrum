<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="screen-orientation" content="landscape"/>
  <title>Toad Runner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    #gameWrap { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
    body.desktop #gameWrap { width: 1000px; height: 400px; max-width: 100vw; max-height: 100vh; box-shadow: 0 0 0 1px rgba(255,255,255,0.06); }
    canvas { display: block; }
    #rotateOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #111;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    #rotateOverlay.portrait { display: flex; }
    #rotateOverlay .icon { font-size: 4rem; margin-bottom: 1rem; }
    #rotateOverlay p { font-size: 1.25rem; max-width: 280px; }
  </style>
</head>
<body>
  <div id="rotateOverlay" class="" aria-hidden="true">
    <span class="icon" aria-hidden="true">↻</span>
    <p>Please rotate your device to landscape to play</p>
  </div>
  <div id="gameWrap">
    <canvas id="gameCanvas" width="1000" height="400"></canvas>
  </div>
  <script>
    (function() {
      var tg = window.Telegram && window.Telegram.WebApp;
      var isDesktop = false;
      if (tg && tg.platform) {
        var p = tg.platform.toLowerCase();
        isDesktop = (p !== 'android' && p !== 'ios');
      }
      if (isDesktop) document.body.classList.add('desktop');

      function isPortrait() { return window.innerWidth < window.innerHeight; }
      function updateRotateOverlay() {
        var el = document.getElementById('rotateOverlay');
        var show = !isDesktop && isPortrait();
        if (show) {
          el.classList.add('portrait');
          el.setAttribute('aria-hidden', 'false');
        } else {
          el.classList.remove('portrait');
          el.setAttribute('aria-hidden', 'true');
        }
      }
      function tryLockLandscape() {
        if (isPortrait()) return;
        if (typeof screen !== 'undefined' && screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(function() {});
        }
        if (tg && tg.lockOrientation && !tg.isOrientationLocked) {
          tg.lockOrientation();
        }
      }
      window.addEventListener('resize', updateRotateOverlay);
      window.addEventListener('orientationchange', function() {
        updateRotateOverlay();
        if (!isPortrait()) tryLockLandscape();
      });
      updateRotateOverlay();
      if (tg) {
        tg.ready();
        if (!isDesktop) {
          tg.expand();
          if (tg.requestFullscreen) tg.requestFullscreen();
          tg.onEvent('fullscreenChanged', function() {
            if (tg.isFullscreen) tryLockLandscape();
          });
          tg.setHeaderColor && tg.setHeaderColor('#111111');
        }
      }
      if (!isPortrait()) tryLockLandscape();
      if (!isDesktop) setTimeout(tryLockLandscape, 500);
    })();
  </script>
  <script src="background.js"></script>
  <script src="player.js"></script>
  <script src="obstacles.js"></script>
  <script src="main.js"></script>
</body>
</html>
